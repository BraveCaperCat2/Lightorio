fluid-handling=Unlocks the ability to barrel fluids.
li_burner-mining=Unlocks a basic form of semi-automation.
li_electric-infrastructure=Unlocks some basic electrical devices.

li_scientific-equipment=Unlocks various items and recipes that are required for producing science packs.

li_photo-electrics=Discovery of the connections between electricity and light.

li_advanced-copper-processing=Unlocks a more efficient way to refine copper, leaving silver as a byproduct.
li_advanced-iron-processing=Unlocks a more efficient way to refine iron, leaving nickel as a byproduct.

li_mirrors=Unlocks the ability to craft highly reflective plates, more commonly known as mirrors.
li_solar-collection=Unlocks a device that can concentrate solar energy into a beam of light.

li_solar-boiling=Unlocks highly efficient solar boilers, which heat water into steam relatively slowly.

