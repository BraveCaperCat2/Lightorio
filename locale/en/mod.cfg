[item-description]
li_mundane-science-pack=A very uninteresting science pack.\n\nThere doesn't seem to be anything very unusual about it.
li_solar-science-pack=The unlimited solar power of Calidus was infused into this science pack.\n\nIt glows in the dark.
li_filtration-science-pack=<insert description here>
li_artificial-science-pack=<insert description here>
li_high-freq-science-pack=This science pack was exposed to intense high-frequency ultraviolet light.\n\nIt appears very dim, but you can just make out a hint of purple.
li_low-freq-science-pack=This science pack was exposed to intense low-frequency infrared light.\n\nIt appears very dim, but you can just make out a hint of red.
li_spectral-science-pack=Somehow, beyond all reason or logic, this science pack has all of the colours in the visible spectrum and beyond.\n\nIt appears in different colours depending on your viewing angle.

li_sand=Finely crushed rock. An example of the "quasi-solid" or "sand" state of matter.
li_glass=A transparent silicate material. Smelted from sand.
li_hot-glass=A flimsy pane of hot silicate material. Non-transparent.
li_glass-bottle=A container for liquids made out of transparent material.
li_chromomixture-1=A strange material. When exposed to a concentrated light source, it changes colour. Do not overexpose.\n\nThis sample has a low purity.
li_chromomixture-2-base=A base powder for creating higher purity chromomixture. It needs to be refined with silver solution before it can be used in industrial processes.
li_chromomixture-2=A strange material. When exposed to a concentrated light source, it changes colour. Do not overexpose.\n\nThis sample has a moderate purity.

li_exposed-chromomixture-1=A form of the colour-changing powder chromomixture. This sample appears to have gotten overexposed.
li_exposed-chromomixture-2=A form of the colour-changing powder chromomixture. This sample appears to have been exposed to intense solar light.

li_crushed-iron-ore=Iron ore crushed into smaller pieces. Can be separated into iron and nickel powders.
li_crushed-copper-ore=Copper ore crushed into smaller pieces. Can be separated into copper and silver powders.
li_iron-powder=Finely ground iron ore. Smelts into iron plates.
li_copper-powder=Finely ground copper ore. Smelts into copper plates.
li_nickel-powder=Finely ground nickel, extracted from impurities in iron ore. Can be used to make silver plates and electric nickel powder.
li_silver-powder=Finely ground silver, extracted from impurities in copper ore. Can be used to make silver plates and silver solution.

li_nickel-plate=A plate of refined nickel.
li_silver-plate=A plate of refined silver.

li_electric-nickel-powder=The powder of a nickel-copper alloy that has a high nickel content. Electrically conductive, even in powder form and has some electromagnetic properties.

li_mirror=A highly reflective plate made using a combination of glass and silver. Useful for redirecting light into a particular direction.

[fluid-name]
li_silver-solution=Silver solution

[fluid-description]
li_silver-solution=A solution made from silver dust and water. Used for high-reflectivity applications, like mirrors.

